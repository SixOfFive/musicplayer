name: Build installers

# Produces one-click installers for every supported OS whenever the main
# branch moves, and attaches them to a GitHub Release whenever a `v*` tag
# is pushed. End users never need Node, npm, or git — they just download
# the right installer from the Releases page and run it.

on:
  # Tag pushes (vX.Y.Z) produce the public GitHub Release with installers +
  # latest.yml metadata for electron-updater. That's the "real" CI.
  push:
    tags: ['v*']
  # Manual trigger is still available for ad-hoc "build the current main"
  # verification — use the Actions tab → Run workflow. Previously we also
  # ran on every push to main, but release:patch pushes the commit AND the
  # tag in quick succession, producing TWO workflow runs and TWO failure
  # emails when Linux hiccuped. Now there's one run per release.
  workflow_dispatch:
  # PR runs still catch regressions in workflow/config changes before merge.
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: 'release/*.exe'
            artifact_name: windows-installer
          - os: ubuntu-latest
            # RPM dropped — fpm's rpmbuild invocation on hosted runners
            # exits 1 intermittently and swallows rpmbuild's own stderr,
            # so there's nothing actionable to fix. Users on Fedora /
            # openSUSE can extract the .tar.gz or `alien` the .deb.
            artifact_glob: |
              release/*.deb
              release/*.tar.gz
            artifact_name: linux-installers
          - os: macos-latest
            artifact_glob: 'release/*.dmg'
            artifact_name: macos-dmg
    runs-on: ${{ matrix.os }}
    # Write permission needed so electron-builder's --publish always can
    # create/append the GitHub Release on tag pushes.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Hard guard: on a tag push, package.json.version MUST match the tag
      # (minus the 'v' prefix). Otherwise the published Release + latest.yml
      # would advertise a different version than what's baked into the app,
      # and electron-updater would loop forever trying to install it.
      - name: Verify tag matches package.json version
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"      # e.g. v0.2.0
          TAG_VER="${TAG#v}"            # e.g. 0.2.0
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VER."
            echo "Bump via 'npm run release:patch' (or minor/major) which keeps them in sync."
            exit 1
          fi
          echo "Tag $TAG matches package.json version $PKG_VER ✓"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # No `cache: npm` — that tries to restore a cache keyed on
          # package-lock.json contents, which can cause platform-specific
          # postinstall (ffmpeg-static binary download, better-sqlite3 rebuild)
          # to be skipped when a sibling-OS cache hits. Explicit clean install
          # every run; builds finish in 5-6 min anyway.

      # Linux-only: electron-builder's fpm backend needs these to produce
      # .deb / .rpm / AppImage outputs. Missing on the hosted image by default.
      # bsdtar (libarchive-tools) is required for AppImage assembly; the rest
      # are for .deb / .rpm fallback targets.
      - if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot dpkg libarchive-tools

      - name: Install dependencies
        # Not `npm ci`: that step doesn't always re-run postinstall hooks when
        # dist files are already present in the cache, which leaves
        # better-sqlite3 compiled against the wrong Node ABI. `npm install`
        # with a lockfile is deterministic AND re-runs postinstall reliably.
        run: npm install --no-audit --no-fund

      - name: Build Vite + TypeScript
        run: npm run build

      - name: Build installer (non-tag)
        # On regular main pushes we only produce the installer as a workflow
        # artifact. No Release, no latest.yml. Lets devs verify the build
        # passes without polluting the public Releases page.
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false

      - name: Build installer (tag — publishes to Release)
        # On v* tag pushes, publish directly from each runner so
        # electron-builder uploads its latest.yml / latest-mac.yml /
        # latest-linux.yml metadata alongside the installers. Without those
        # files, electron-updater in installed builds can't find updates.
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          USE_HARD_LINKS: false

      # Always list what's in the release dir so we can see if the artifact
      # glob missed its target.
      - name: List release dir
        if: always()
        shell: bash
        run: |
          echo "=== release/ ==="
          ls -la release/ 2>/dev/null || echo "no release dir"

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  # On tag pushes, promote the draft release to a public release ONLY
  # after every matrix runner has finished uploading its artifacts +
  # metadata files (latest.yml, latest-mac.yml, latest-linux.yml).
  #
  # Why the draft-then-promote dance: electron-builder publishes from
  # each runner independently. Without this, whichever OS finishes
  # first creates a PUBLIC release with just its own artifacts; the
  # other runners append theirs as they finish — but during that
  # window, end-users whose apps auto-check for updates see a
  # release-exists / latest.yml-missing state and fail with 404s.
  #
  # Marking releaseType='draft' in package.json keeps the release
  # invisible to electron-updater's public-releases query until this
  # final job flips the draft flag after all three runners succeed.
  # From the user's perspective, there's no intermediate broken state:
  # the release either doesn't exist yet, or exists with every asset.
  promote-release:
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Promote draft release to public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          echo "Promoting draft release for tag $TAG to public…"
          # `gh release edit` with --draft=false flips the flag. Idempotent:
          # if the release is already non-draft (manual upload, rerun, etc.)
          # this is a no-op.
          gh release edit "$TAG" --draft=false --repo "$GITHUB_REPOSITORY"
          echo "Release $TAG is now public."


name: Build installers

# Produces one-click installers for every supported OS whenever the main
# branch moves, and attaches them to a GitHub Release whenever a `v*` tag
# is pushed. End users never need Node, npm, or git — they just download
# the right installer from the Releases page and run it.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:        # manual trigger from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_glob: 'release/*.exe'
            artifact_name: windows-installer
          - os: ubuntu-latest
            artifact_glob: 'release/*.AppImage'
            artifact_name: linux-appimage
          - os: macos-latest
            artifact_glob: 'release/*.dmg'
            artifact_name: macos-dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Linux electron-builder needs these for AppImage/deb construction.
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - run: npm ci

      - run: npm run electron:build
        env:
          # Don't attempt to publish to GitHub from the build step;
          # we attach artifacts as a separate upload step below.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false   # no code signing cert

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn

  release:
    # Only when a `v*` tag was pushed — attach built installers to the Release.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-installers

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-installers/**/*
          generate_release_notes: true

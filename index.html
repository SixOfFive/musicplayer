<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusicPlayer</title>
    <!-- 'unsafe-eval' in script-src is required by butterchurn (Milkdrop):
         presets compile to JS at runtime via `new Function(...)`.
         http:/https: in media-src + img-src so internet radio streams and
         station favicons load (Radio-Browser serves metadata over https;
         many actual stream endpoints are still http). Scripts are not
         allowed from http/https remotes — only local + the butterchurn
         inline compile path. -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https: file: mp-media:; media-src 'self' file: mp-media: blob: http: https:; script-src 'self' 'unsafe-eval'; connect-src 'self' http: https: ws: wss:;" />
  </head>
  <body class="bg-bg-base text-text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
